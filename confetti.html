<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest Completed</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <script>
    const myConfetti = confetti.create(
      document.getElementById('confetti-canvas'),
      { resize: true, useWorker: true }
    );

    // Erste große Explosion
    myConfetti({
      particleCount: 200,
      spread: 160,
      origin: { x: 0.5, y: 0.4 },
      colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#c77dff']
    });

    // Zweite Welle nach kurzer Verzögerung
    setTimeout(() => {
      myConfetti({
        particleCount: 150,
        angle: 60,
        spread: 80,
        origin: { x: 0, y: 0.6 },
        colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff']
      });
      myConfetti({
        particleCount: 150,
        angle: 120,
        spread: 80,
        origin: { x: 1, y: 0.6 },
        colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff']
      });
    }, 700);

    // Dauerhafter leichter Konfetti-Regen
    const duration = 8000;
    const end = Date.now() + duration;

    (function rain() {
      myConfetti({
        particleCount: 4,
        angle: 90,
        spread: 120,
        origin: { x: Math.random(), y: 0 },
        gravity: 0.8,
        colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#c77dff', '#ffffff']
      });
      if (Date.now() < end) {
        requestAnimationFrame(rain);
      }
    })();
  </script>
</body>
</html>
